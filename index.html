<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FNTS</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d0d12">
    <link rel="stylesheet" href="styles/common.css">
</head>
<body>
    <div class="noise" aria-hidden="true"></div>
    <div class="viewport-grid" aria-hidden="true"></div>

    <header>
        <div class="fnts-logo">
            <svg viewBox="0 0 27 9" xmlns="http://www.w3.org/2000/svg">
                <path fill-rule="evenodd" clip-rule="evenodd" d="M2.69769 5.04651C2.79306 5.0163 2.89463 5 3 5L2.69769 5.04651Z"/>

0047 5.52087 6.4147 5.68782 5.62481C5.86365 4.79294 6.06388 3.84559 6 3C6 2.44772 5.55228 2 5 2H2.75C2.33579 2 2 2.33579 2 2.75C2 3.16421 2.33579 3.5 2.75 3.5H4.25C4.66421 3.5 5 3.83579 5 4.25C5 4.66421 4.66421 5 4.25 5H3Z"/>
            </svg>
        </div>
        <nav>
            <a href="index.html" class="i18n active" data-key="headNavigation.home"></a>
            <a href="about.html" class="i18n" data-key="headNavigation.about"></a>
            <a href="apps.html" class="i18n" data-key="headNavigation.apps"></a>
            <a href="contact.html" class="i18n" data-key="headNavigation.contact"></a>
        </nav>
        <div class="theme-area">
            <input type="checkbox" id="theme-toggle" checked>
            <label for="theme-toggle">
                <i class='bx bxs-sun'></i>
            </label>
        </div>
        <button class="language-toggle" type="button" aria-label="Change language">EN</button>
    </header>

    <main>
        <section class="hero">
            <div class="hero-bg-human" aria-hidden="true"><img src="human.svg" alt=""></div>
            <div class="hero-orbit" aria-hidden="true"><div class="orbit-ring orbit-ring-a"></div><div class="orbit-ring orbit-ring-b"></div></div>
            <div class="hero-content">
                <div class="hero-text">
                    <h1 class="i18n" data-key="catchcopy.title"></h1>
                    <p class="i18n" data-key="catchcopy.description"></p>
                    <div class="hero-meta"><span>Tokyo, JP</span><span class="i18n" data-key="hero.established"></span></div>
                </div>
                <div class="gizmo-stage" aria-label="Interactive 3D axis gizmo">
                    <div class="gizmo-dots" aria-hidden="true"></div>
                    <div id="three-gizmo" class="three-gizmo"></div>
                    <span class="stage-label stage-label-top i18n" data-key="gizmo.object"></span>
                    <span class="stage-label stage-label-bottom i18n" data-key="gizmo.drag"></span>
                </div>
            </div>
            <a class="scroll-cue" href="#about"><span></span><b class="i18n" data-key="hero.scroll"></b></a>
        </section>

        <section class="about">
            <p class="about-label i18n" data-key="about.label"></p>
            <div class="about-grid">
                <p class="about-bio animate-in i18n" data-key="about.bio"></p>
                <div class="about-card animate-in animate-in-d1">
                    <div class="icon"><i class='bx bx-code'></i></div>
                    <h3 class="i18n" data-key="about.videos.title"></h3>
                    <p class="i18n" data-key="about.videos.description"></p>
                </div>
                <div class="about-card animate-in animate-in-d2">
                    <div class="icon"><i class='bx bx-user'></i></div>
                    <h3 class="i18n" data-key="about.graphical.title"></h3>
                    <p class="i18n" data-key="about.graphical.description"></p>
                </div>
                <div class="about-card animate-in animate-in-d3">
                    <div class="icon"><i class='bx bx-palette'></i></div>
                    <h3 class="i18n" data-key="about.design.title"></h3>
                    <p class="i18n" data-key="about.design.description"></p>
                </div>
                <div class="about-card animate-in animate-in-d4">
                    <div class="icon"><i class='bx bx-user'></i></div>
                    <h3 class="i18n" data-key="about.soccer.title"></h3>
                    <p class="i18n" data-key="about.soccer.description"></p>
                </div>
            </div>
        </section>

        <section class="works">
            <p class="works-label i18n" data-key="works.label"></p>

            <div class="works-block works-block--right animate-in">
                <div class="works-info">
                    <h3>After Effects</h3>
                    <p class="i18n" data-key="works.ae.description"></p>
                </div>
                <div class="works-visual">
                    <img src="effects.svg" alt="After Effects">
                </div>
            </div>

            <div class="works-block works-block--left animate-in animate-in-d2">
                <div class="works-visual">
                    <img src="premiere.svg" alt="Premiere Pro">
                </div>
                <div class="works-info">
                    <h3>Premiere Pro</h3>
                    <p class="i18n" data-key="works.pr.description"></p>
                </div>
            </div>
        </section>

        <section class="showcase">
            <p class="showcase-label i18n" data-key="showcase.label"></p>
            <div class="showcase-wrap">
                <div class="showcase-stage">
                    <div class="showcase-card" data-idx="0">
                        <span class="showcase-tag">VFX</span>
                        <h4 class="i18n" data-key="showcase.card1.title"></h4>
                        <p class="i18n" data-key="showcase.card1.desc"></p>
                    </div>
                    <div class="showcase-card" data-idx="1">
                        <span class="showcase-tag">Edit</span>
                        <h4 class="i18n" data-key="showcase.card2.title"></h4>
                        <p class="i18n" data-key="showcase.card2.desc"></p>
                    </div>
                    <div class="showcase-card" data-idx="2">
                        <span class="showcase-tag">Motion</span>
                        <h4 class="i18n" data-key="showcase.card3.title"></h4>
                        <p class="i18n" data-key="showcase.card3.desc"></p>
                    </div>
                    <div class="showcase-card" data-idx="3">
                        <span class="showcase-tag">YouTube</span>
                        <h4 class="i18n" data-key="showcase.card4.title"></h4>
                        <p class="i18n" data-key="showcase.card4.desc"></p>
                    </div>
                    <div class="showcase-card" data-idx="4">
                        <span class="showcase-tag">Design</span>
                        <h4 class="i18n" data-key="showcase.card5.title"></h4>
                        <p class="i18n" data-key="showcase.card5.desc"></p>
                    </div>
                    <div class="showcase-card" data-idx="5">
                        <span class="showcase-tag">3DCG</span>
                        <h4 class="i18n" data-key="showcase.card6.title"></h4>
                        <p class="i18n" data-key="showcase.card6.desc"></p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-motion-mark animate-on-scroll" aria-label="Start the Unknown">
            <span class="motion-slash" aria-hidden="true">/</span>
            <p><span class="i18n" data-key="footer.catchcopy"></span></p>
        </div>
        <div class="footer-inner">
            <div class="footer-brand">
                <h3>FNTS</h3>
                <p class="i18n" data-key="footer.description"></p>
            </div>
            <div class="footer-social">
                <a href="#" aria-label="GitHub"><i class='bx bxl-github'></i></a>
                <a href="#" aria-label="Twitter"><i class='bx bxl-twitter'></i></a>
                <a href="#" aria-label="Discord"><i class='bx bxl-discord-alt'></i></a>
            </div>
        </div>
        <p class="copy">&copy; 2026 FNTS</p>
    </footer>

    <script src="util/language.js"></script>
    <script src="js/parts/theme-toggler.js"></script>
    <script src="js/parts/scroll-animations.js"></script>
    <script src="js/parts/showcase-scroll.js"></script>
    <script type="module" src="js/parts/three-gizmo.js"></script>
</body>
</html>
